<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Verificação de Carteirinha — AGF</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif;background:linear-gradient(160deg,#0f3d2e,#0b2a4a);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;color:#1e293b}
  .card{background:#fff;border-radius:20px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}
  .top{background:linear-gradient(135deg,#1d7a3a,#155e2c);color:#fff;padding:22px 22px 18px;text-align:center}
  .top .ent{font-size:11px;letter-spacing:1.5px;opacity:.85;font-weight:700}
  .top .agf{font-size:30px;font-weight:900;letter-spacing:1px;margin-top:2px}
  .top .agf small{display:block;font-size:10px;font-weight:600;letter-spacing:1px;opacity:.9;margin-top:2px}
  .status{padding:18px 22px;text-align:center}
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:800;padding:9px 18px;border-radius:30px}
  .ok{background:#dcfce7;color:#15803d}
  .bad{background:#fee2e2;color:#b91c1c}
  .body{padding:6px 22px 22px}
  .row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
  .row:last-child{border-bottom:none}
  .row .k{color:#64748b;font-weight:600}
  .row .v{color:#0f172a;font-weight:700;text-align:right}
  .cond{display:inline-block;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;border-radius:8px;padding:2px 10px;font-size:13px;font-weight:800}
  .datas{margin-top:6px}
  .datas .lbl{color:#64748b;font-weight:600;font-size:13px;margin-bottom:6px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:8px;padding:3px 9px;font-size:12px;font-weight:700}
  .foot{background:#f8fafc;padding:12px 22px;text-align:center;font-size:11px;color:#94a3b8}
  .loading,.erro{padding:40px 22px;text-align:center;color:#64748b}
  .spin{width:30px;height:30px;border:3px solid #e2e8f0;border-top-color:#1d7a3a;border-radius:50%;animation:r .8s linear infinite;margin:0 auto 12px}
  @keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="ent">ENTIDADE EXECUTORA</div>
      <div class="agf">AGF<small>ASSOCIAÇÃO GOIANA DE FISIOTERAPIA</small></div>
    </div>
    <div id="conteudo">
      <div class="loading"><div class="spin"></div>Verificando carteirinha...</div>
    </div>
    <div class="foot">Verificação oficial • Apoio Institucional: Advogado Malaguias</div>
  </div>

<script>
const SB='https://vuylzbefjwbtibhnczih.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1eWx6YmVmandidGliaG5jemloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDUxNTIsImV4cCI6MjA5MzY4MTE1Mn0.c2SJ6Yw7O5bGK8lqBtDFkiWke2UNX4I9NJiJ25xprBM';
const TIPOS={fibromialgia:'Fibromialgia',cronicas:'Doenças Crônicas'};
function $(id){return document.getElementById(id);}
function fmtData(d){ if(!d) return '—'; const p=String(d).slice(0,10).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d; }
function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;');}

(async ()=>{
  const token=new URLSearchParams(location.search).get('c');
  const box=$('conteudo');
  if(!token){ box.innerHTML='<div class="erro">Código não informado.</div>'; return; }
  try{
    const r=await fetch(`${SB}/rest/v1/rpc/verificar_carteirinha`,{
      method:'POST',
      headers:{apikey:ANON,Authorization:'Bearer '+ANON,'Content-Type':'application/json'},
      body:JSON.stringify({p_token:token})
    });
    const d=await r.json();
    if(!d || d.encontrada===false){ box.innerHTML='<div class="status"><span class="badge bad">❌ Carteirinha não encontrada</span></div>'; return; }
    const hoje=new Date().toISOString().slice(0,10);
    const valida = d.ativo!==false && (!d.validade || d.validade>=hoje);
    const datas=Array.isArray(d.atendimentos)?d.atendimentos:[];
    const chips=datas.length?datas.map(x=>`<span class="chip">${fmtData(x)}</span>`).join(''):'<span style="color:#94a3b8;font-size:13px">Sem datas registradas</span>';
    box.innerHTML=`
      <div class="status">
        <span class="badge ${valida?'ok':'bad'}">${valida?'✅ Paciente identificado':'⚠️ Carteirinha inválida/vencida'}</span>
      </div>
      <div class="body">
        <div class="row"><span class="k">Nome</span><span class="v">${esc(d.nome)||'—'}</span></div>
        <div class="row"><span class="k">Tratamento</span><span class="v"><span class="cond">${TIPOS[d.tipo]||esc(d.tipo)||'—'}</span></span></div>
        <div class="row"><span class="k">Nº Carteirinha</span><span class="v">${esc(d.numero)||'—'}</span></div>
        <div class="row"><span class="k">Emissão</span><span class="v">${fmtData(d.emitida_em)}</span></div>
        <div class="row"><span class="k">Validade</span><span class="v">${fmtData(d.validade)}</span></div>
        <div class="datas">
          <div class="lbl" style="margin-top:12px">📅 Datas de atendimento (${datas.length})</div>
          <div class="chips">${chips}</div>
        </div>
      </div>`;
  }catch(e){
    box.innerHTML='<div class="erro">Erro ao verificar. Tente novamente.</div>';
  }
})();
</script>
</body>
</html>
